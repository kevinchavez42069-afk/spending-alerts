name: Check spending

on:
  schedule:
    # 13:00 UTC daily (~9am ET / 8am CT during standard time; adjust if needed)
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-spending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run spending check
        env:
          PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
          PLAID_SECRET: ${{ secrets.PLAID_SECRET }}
          PLAID_ACCESS_TOKEN: ${{ secrets.PLAID_ACCESS_TOKEN }}
          PLAID_ENV: ${{ secrets.PLAID_ENV }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_spending.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json
          git diff --staged --quiet || git commit -m "Update dashboard data [skip ci]"
          git push
